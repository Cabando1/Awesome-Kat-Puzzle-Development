name: Deploy Awesome Kat Puzzle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Validate required game files and scripts
        run: |
          test -f index.html
          test -f classic.html
          test -f game.html
          test -f advanced.html
          test -f advanced.css
          test -f advanced.js
          test -f volume3.html
          test -f volume3.js
          test -f assets/audio/stubborn-hiss.mp3
          test -f assets/audio/laser-pointer.mp3
          test -f joe-admin.html
          node --check advanced.js
          node --check volume3.js
          node <<'NODE'
          const fs = require('fs');
          for (const file of ['index.html', 'classic.html', 'joe-admin.html']) {
            const html = fs.readFileSync(file, 'utf8');
            const scripts = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
            scripts.forEach((match, index) => {
              try { new Function(match[1]); }
              catch (error) { throw new Error(`${file} inline script ${index + 1}: ${error.message}`); }
            });
          }

          const volume3Html = fs.readFileSync('volume3.html', 'utf8');
          if (/volume3-(?:hiss|laser)-\d+\.js/.test(volume3Html)) {
            throw new Error('Volume 3 must load hiss and laser sounds from normal audio files.');
          }

          let encodedGame = '';
          for (let part = 1; part <= 4; part += 1) {
            const fragment = fs.readFileSync(`volume3-code-${part}.js`, 'utf8');
            const match = fragment.match(/(?:=|\+=)'([^']*)';/);
            if (!match) throw new Error(`Could not parse Volume 3 code fragment ${part}.`);
            encodedGame += match[1];
          }
          const volume3Source = Buffer.from(encodedGame, 'base64').toString('utf8');
          new Function(volume3Source);
          for (const audioPath of [
            'assets/audio/stubborn-hiss.mp3',
            'assets/audio/laser-pointer.mp3',
          ]) {
            if (!volume3Source.includes(audioPath)) {
              throw new Error(`Volume 3 does not reference ${audioPath}.`);
            }
          }
          if (/data:audio\/mpeg;base64/.test(volume3Source)) {
            throw new Error('Volume 3 still contains embedded audio data.');
          }
          if (!volume3Source.includes('arrivalHiss.play()')) {
            throw new Error('Stubborn-cat arrival hiss is missing.');
          }
          if (!volume3Source.includes('Ve("stubborn"')) {
            throw new Error('The first-time Stubborn lesson is missing.');
          }

          const requiredControls = ['rotate', 'down', 'left', 'right', 'drop'];
          for (const control of requiredControls) {
            if (!volume3Html.includes(`data-action="${control}"`)) {
              throw new Error(`Volume 3 is missing the ${control} control.`);
            }
          }
          NODE
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload static game
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
